<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aircraft Interactive Trainer</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0f1c;
color:white;
}

header{
text-align:center;
padding:15px;
}

h1{color:#00d4ff;}

.container{
position:relative;
max-width:900px;
margin:auto;
}

.aircraft{
width:100%;
border-radius:10px;
}

.hotspot{
position:absolute;
width:14px;
height:14px;
background:#00d4ff;
border-radius:50%;
cursor:pointer;
box-shadow:0 0 10px #00d4ff;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

.info{
position:absolute;
background:rgba(0,0,0,0.8);
padding:10px;
border-radius:8px;
display:none;
max-width:200px;
font-size:13px;
border:1px solid #00d4ff;
}

.watermark{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) rotate(-25deg);
font-size:40px;
opacity:0.05;
pointer-events:none;
}
</style>
</head>

<body>

<div class="watermark">Mr. Fawzi Milibari</div>

<header>
<h1>Interactive Aircraft Anatomy Map</h1>
<p>Click on the aircraft parts</p>
</header>

<div class="container">

<!-- Aircraft Image -->
<img src="https://i.imgur.com/8QfKQ9M.png" class="aircraft">

<!-- HOTSPOTS -->

<div class="hotspot" style="top:45%;left:50%;" 
onclick="showInfo(event,'Fuselage','Main body of aircraft')"></div>

<div class="hotspot" style="top:25%;left:30%;" 
onclick="showInfo(event,'Wing','Generates lift')"></div>

<div class="hotspot" style="top:25%;left:70%;" 
onclick="showInfo(event,'Wing','Generates lift')"></div>

<div class="hotspot" style="top:15%;left:50%;" 
onclick="showInfo(event,'Cockpit','Pilot control area')"></div>

<div class="hotspot" style="top:60%;left:50%;" 
onclick="showInfo(event,'Landing Gear','Supports landing & ground movement')"></div>

<div class="hotspot" style="top:40%;left:80%;" 
onclick="showInfo(event,'Engine','Provides thrust for flight')"></div>

<div class="hotspot" style="top:40%;left:20%;" 
onclick="showInfo(event,'Engine','Provides thrust for flight')"></div>

<div class="hotspot" style="top:10%;left:50%;" 
onclick="showInfo(event,'Vertical Stabilizer','Yaw stability control')"></div>

<!-- INFO BOX -->
<div id="info" class="info"></div>

</div>

<footer style="text-align:center;padding:20px;opacity:0.7;">
Prepared by Mr. Fawzi Milibari
</footer>

<script>

function showInfo(e,title,desc){
let box=document.getElementById("info");

box.style.display="block";
box.style.left=e.pageX+"px";
box.style.top=e.pageY+"px";

box.innerHTML=
"<b>"+title+"</b><br>"+desc+
"<br><button onclick='speak(\""+title+"\")'>🔊 Listen</button>";
}

function speak(text){
let msg=new SpeechSynthesisUtterance(text);
msg.lang="en-US";
msg.rate=0.9;
speechSynthesis.speak(msg);
}

document.addEventListener("click",function(e){
if(!e.target.classList.contains("hotspot")){
document.getElementById("info").style.display="none";
}
});

</script>

</body>
</html>
