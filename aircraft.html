<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aircraft Interactive Trainer</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0f1c;
color:white;
text-align:center;
}

h1{
color:#00d4ff;
padding:20px;
}

.container{
position:relative;
max-width:1200px;
margin:auto;
}

.container img{
width:100%;
border-radius:10px;
}

.hotspot{
position:absolute;
width:12px;
height:12px;
background:#00d4ff;
border-radius:50%;
cursor:pointer;
box-shadow:0 0 8px #00d4ff;
}

.info{
position:absolute;
background:rgba(0,0,0,0.9);
padding:10px;
border-radius:8px;
display:none;
max-width:260px;
border:1px solid #00d4ff;
font-size:13px;
}

button{
margin:10px;
padding:10px 15px;
border:none;
background:#00d4ff;
cursor:pointer;
border-radius:6px;
}

.watermark{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) rotate(-25deg);
font-size:40px;
opacity:0.05;
pointer-events:none;
}
</style>
</head>

<body>

<div class="watermark">Mr. Fawzi Milibari</div>

<h1>✈️ Aircraft Interactive Diagram</h1>

<div class="container">

<img src="aircraft.png">

<!-- NOSE -->
<div class="hotspot" style="top:55%; left:8%;" onclick="show(event,'Nose','Front part of aircraft')"></div>

<!-- COCKPIT -->
<div class="hotspot" style="top:50%; left:15%;" onclick="show(event,'Cockpit','Pilot control area')"></div>

<!-- FUSELAGE -->
<div class="hotspot" style="top:55%; left:40%;" onclick="show(event,'Fuselage','Main body of aircraft')"></div>

<!-- WING -->
<div class="hotspot" style="top:50%; left:55%;" onclick="show(event,'Wing','Generates lift')"></div>

<!-- ENGINE -->
<div class="hotspot" style="top:65%; left:55%;" onclick="show(event,'Engine','Provides thrust')"></div>

<!-- FAN -->
<div class="hotspot" style="top:67%; left:50%;" onclick="show(event,'Fan','Engine intake fan')"></div>

<!-- COMPRESSOR -->
<div class="hotspot" style="top:67%; left:54%;" onclick="show(event,'Compressor','Compresses air')"></div>

<!-- COMBUSTION -->
<div class="hotspot" style="top:67%; left:58%;" onclick="show(event,'Combustion Chamber','Fuel combustion area')"></div>

<!-- TURBINE -->
<div class="hotspot" style="top:67%; left:62%;" onclick="show(event,'Turbine','Drives engine rotation')"></div>

<!-- LANDING GEAR -->
<div class="hotspot" style="top:75%; left:45%;" onclick="show(event,'Main Landing Gear','Supports aircraft weight')"></div>

<!-- NOSE GEAR -->
<div class="hotspot" style="top:75%; left:18%;" onclick="show(event,'Nose Landing Gear','Front wheel system')"></div>

<!-- WING FLAPS -->
<div class="hotspot" style="top:53%; left:60%;" onclick="show(event,'Flaps','Increase lift during landing')"></div>

<!-- AILERONS -->
<div class="hotspot" style="top:48%; left:63%;" onclick="show(event,'Ailerons','Control roll')"></div>

<!-- SLATS -->
<div class="hotspot" style="top:47%; left:58%;" onclick="show(event,'Slats','Improve lift at low speed')"></div>

<!-- SPOILERS -->
<div class="hotspot" style="top:45%; left:60%;" onclick="show(event,'Spoilers','Reduce lift')"></div>

<!-- TAIL -->
<div class="hotspot" style="top:50%; left:85%;" onclick="show(event,'Tail','Stability system')"></div>

<!-- VERTICAL STAB -->
<div class="hotspot" style="top:35%; left:90%;" onclick="show(event,'Vertical Stabilizer','Yaw control')"></div>

<!-- HORIZONTAL STAB -->
<div class="hotspot" style="top:50%; left:90%;" onclick="show(event,'Horizontal Stabilizer','Pitch stability')"></div>

<!-- RUDDER -->
<div class="hotspot" style="top:40%; left:92%;" onclick="show(event,'Rudder','Yaw control surface')"></div>

<!-- ELEVATOR -->
<div class="hotspot" style="top:52%; left:92%;" onclick="show(event,'Elevator','Pitch control surface')"></div>

<div id="info" class="info"></div>

</div>

<br>

<button onclick="location.href='training.html'">⬅ Back</button>

<script>

function show(e,title,desc){
let box=document.getElementById("info");

box.style.display="block";
box.style.left=e.pageX+"px";
box.style.top=e.pageY+"px";

box.innerHTML="<b>"+title+"</b><br>"+desc;
}

document.addEventListener("click",function(e){
if(!e.target.classList.contains("hotspot")){
document.getElementById("info").style.display="none";
}
});

</script>

</body>
</html>
