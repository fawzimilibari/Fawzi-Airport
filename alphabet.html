<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aviation Training Course</title>

<style>
body {
    font-family: Arial;
    margin:0;
    background:#0a0f1c;
    color:white;
}

header {
    text-align:center;
    padding:20px;
}

h1 { color:#00d4ff; }

.section {
    padding:20px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
    gap:10px;
}

.card {
    background:#111a2e;
    padding:15px;
    text-align:center;
    border-radius:10px;
    border:1px solid #00d4ff33;
    transition:0.3s;
}

.card:hover {
    transform:scale(1.05);
    box-shadow:0 0 10px #00d4ff;
}

.big {
    font-size:26px;
    font-weight:bold;
    color:#00d4ff;
}

button {
    margin-top:8px;
    padding:5px;
    border:none;
    background:#00d4ff;
    cursor:pointer;
}

.watermark {
    position:fixed;
    opacity:0.06;
    font-size:40px;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) rotate(-30deg);
    pointer-events:none;
}
</style>
</head>

<body>

<div class="watermark">Mr. Fawzi Milibari</div>

<header>
<h1>Aviation Training Course</h1>
<p>ICAO & IATA Standard Learning Platform</p>
</header>

<div class="section">
<h2>Module 1: Phonetic Alphabet</h2>
<div class="grid" id="letters"></div>
</div>

<div class="section">
<h2>Module 2: Aviation Numbers</h2>
<div class="grid" id="numbers"></div>
</div>

<footer style="text-align:center;padding:20px;">
Prepared by Mr. Fawzi Milibari
</footer>

<script>

const letters = [
["A","Alpha"],["B","Bravo"],["C","Charlie"],["D","Delta"],
["E","Echo"],["F","Foxtrot"],["G","Golf"],["H","Hotel"],
["I","India"],["J","Juliett"],["K","Kilo"],["L","Lima"],
["M","Mike"],["N","November"],["O","Oscar"],["P","Papa"],
["Q","Quebec"],["R","Romeo"],["S","Sierra"],["T","Tango"],
["U","Uniform"],["V","Victor"],["W","Whiskey"],["X","X-ray"],
["Y","Yankee"],["Z","Zulu"]
];

const numbers = [
["0","Zero"],["1","One"],["2","Two"],["3","Three"],
["4","Four"],["5","Five"],["6","Six"],["7","Seven"],
["8","Eight"],["9","Nine"]
];

function speak(text){
    let msg = new SpeechSynthesisUtterance(text);
    msg.lang="en-US";
    speechSynthesis.speak(msg);
}

function load(data, id){
    let container=document.getElementById(id);

    data.forEach(i=>{
        let div=document.createElement("div");
        div.className="card";
        div.innerHTML=`
            <div class="big">${i[0]}</div>
            <div>${i[1]}</div>
            <button onclick="speak('${i[1]}')">🔊</button>
        `;
        container.appendChild(div);
    });
}

load(letters,"letters");
load(numbers,"numbers");

</script>

</body>
</html>
