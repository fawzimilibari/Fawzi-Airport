<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Airport Interactive Trainer</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0f1c;
color:white;
text-align:center;
}

h1{
color:#00d4ff;
padding:20px;
}

.container{
position:relative;
max-width:1000px;
margin:auto;
}

.container img{
width:100%;
border-radius:10px;
}

.hotspot{
position:absolute;
width:14px;
height:14px;
background:#00d4ff;
border-radius:50%;
cursor:pointer;
box-shadow:0 0 10px #00d4ff;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

.info{
position:absolute;
background:rgba(0,0,0,0.9);
padding:10px;
border-radius:8px;
display:none;
max-width:260px;
border:1px solid #00d4ff;
font-size:13px;
}

button{
margin:10px;
padding:10px 15px;
border:none;
background:#00d4ff;
cursor:pointer;
border-radius:6px;
}

.watermark{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) rotate(-25deg);
font-size:40px;
opacity:0.05;
pointer-events:none;
}
</style>
</head>

<body>

<div class="watermark">Mr. Fawzi Milibari</div>

<h1>🏢 Airport Interactive Diagram</h1>

<div class="container">

<img src="airport.png">

<!-- RUNWAY -->
<div class="hotspot" style="top:60%;left:20%;" onclick="show(event,'Runway','Aircraft takeoff and landing surface')"></div>

<div class="hotspot" style="top:58%;left:30%;" onclick="show(event,'Runway Threshold','Start of landing area')"></div>

<div class="hotspot" style="top:55%;left:40%;" onclick="show(event,'Touchdown Zone','Landing contact area')"></div>

<!-- TAXIWAY -->
<div class="hotspot" style="top:50%;left:45%;" onclick="show(event,'Taxiway','Aircraft movement path')"></div>

<div class="hotspot" style="top:52%;left:35%;" onclick="show(event,'Holding Position','Aircraft waiting point')"></div>

<div class="hotspot" style="top:48%;left:55%;" onclick="show(event,'Rapid Exit Taxiway','Quick runway exit')"></div>

<!-- APRON -->
<div class="hotspot" style="top:40%;left:60%;" onclick="show(event,'Apron','Aircraft parking and service area')"></div>

<div class="hotspot" style="top:42%;left:70%;" onclick="show(event,'Parking Stand','Aircraft parking position')"></div>

<div class="hotspot" style="top:38%;left:75%;" onclick="show(event,'Pushback Area','Aircraft pushback zone')"></div>

<!-- TERMINAL -->
<div class="hotspot" style="top:25%;left:80%;" onclick="show(event,'Terminal','Passenger processing building')"></div>

<div class="hotspot" style="top:30%;left:75%;" onclick="show(event,'Boarding Gate','Passenger boarding area')"></div>

<div class="hotspot" style="top:28%;left:85%;" onclick="show(event,'Jet Bridge','Connects aircraft to terminal')"></div>

<!-- SUPPORT -->
<div class="hotspot" style="top:20%;left:50%;" onclick="show(event,'ATC Tower','Controls aircraft movement')"></div>

<div class="hotspot" style="top:35%;left:20%;" onclick="show(event,'Fuel Farm','Fuel storage area')"></div>

<div class="hotspot" style="top:30%;left:25%;" onclick="show(event,'Hangar','Aircraft maintenance area')"></div>

<div id="info" class="info"></div>

</div>

<br>

<button onclick="location.href='training.html'">⬅ Back</button>

<script>

function show(e,title,desc){
let box=document.getElementById("info");

box.style.display="block";
box.style.left=e.pageX+"px";
box.style.top=e.pageY+"px";

box.innerHTML =
"<b>"+title+"</b><br>"+desc+
"<br><button onclick='speak(\""+title+"\")'>🔊</button>";
}

function speak(text){
let msg=new SpeechSynthesisUtterance(text);
msg.lang="en-US";
msg.rate=0.9;
speechSynthesis.speak(msg);
}

document.addEventListener("click",function(e){
if(!e.target.classList.contains("hotspot")){
document.getElementById("info").style.display="none";
}
});

</script>

</body>
</html>
