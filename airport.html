<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Airport Interactive Trainer</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0f1c;
color:white;
text-align:center;
}

h1{
color:#00d4ff;
padding:20px;
}

.container{
position:relative;
max-width:1200px;
margin:auto;
}

.container img{
width:100%;
border-radius:10px;
}

.hotspot{
position:absolute;
width:12px;
height:12px;
background:#00d4ff;
border-radius:50%;
cursor:pointer;
box-shadow:0 0 8px #00d4ff;
}

.info{
position:absolute;
background:rgba(0,0,0,0.9);
padding:10px;
border-radius:8px;
display:none;
max-width:260px;
border:1px solid #00d4ff;
font-size:13px;
}

button{
margin:10px;
padding:10px 15px;
border:none;
background:#00d4ff;
cursor:pointer;
border-radius:6px;
}

.watermark{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) rotate(-25deg);
font-size:40px;
opacity:0.05;
pointer-events:none;
}
</style>
</head>

<body>

<div class="watermark">Mr. Fawzi Milibari</div>

<h1>🏢 Airport Interactive Diagram</h1>

<div class="container">

<img src="airport.png">

<!-- RUNWAY -->
<div class="hotspot" style="top:18%; left:30%;" onclick="show(event,'Runway','Takeoff and landing surface')"></div>

<div class="hotspot" style="top:18%; left:15%;" onclick="show(event,'Runway Threshold','Start of runway landing area')"></div>

<div class="hotspot" style="top:20%; left:40%;" onclick="show(event,'Touchdown Zone','Landing contact area')"></div>

<div class="hotspot" style="top:18%; left:55%;" onclick="show(event,'Runway Centerline','Center guidance line')"></div>

<div class="hotspot" style="top:18%; left:80%;" onclick="show(event,'Runway End / Stopway','End safety area')"></div>

<!-- TAXIWAY -->
<div class="hotspot" style="top:30%; left:50%;" onclick="show(event,'Taxiway','Aircraft movement path')"></div>

<div class="hotspot" style="top:30%; left:35%;" onclick="show(event,'Taxiway Centerline','Taxi guidance line')"></div>

<div class="hotspot" style="top:32%; left:55%;" onclick="show(event,'Holding Position','Aircraft holding point')"></div>

<div class="hotspot" style="top:30%; left:65%;" onclick="show(event,'Rapid Exit Taxiway','Quick runway exit')"></div>

<!-- APRON -->
<div class="hotspot" style="top:45%; left:40%;" onclick="show(event,'Apron / Ramp','Aircraft parking and service area')"></div>

<div class="hotspot" style="top:48%; left:45%;" onclick="show(event,'Parking Stand','Aircraft parking position')"></div>

<div class="hotspot" style="top:48%; left:55%;" onclick="show(event,'Gate Position','Aircraft gate position')"></div>

<div class="hotspot" style="top:50%; left:42%;" onclick="show(event,'Pushback Area','Aircraft pushback zone')"></div>

<div class="hotspot" style="top:52%; left:48%;" onclick="show(event,'Ground Handling','Service operations area')"></div>

<!-- TERMINAL -->
<div class="hotspot" style="top:60%; left:65%;" onclick="show(event,'Terminal','Passenger building')"></div>

<div class="hotspot" style="top:65%; left:60%;" onclick="show(event,'Check-in Area','Passenger check-in area')"></div>

<div class="hotspot" style="top:55%; left:70%;" onclick="show(event,'Boarding Gates','Passenger boarding area')"></div>

<div class="hotspot" style="top:55%; left:75%;" onclick="show(event,'Jet Bridge','Connects terminal to aircraft')"></div>

<div class="hotspot" style="top:50%; left:80%;" onclick="show(event,'Security Screening','Security control area')"></div>

<!-- SUPPORT -->
<div class="hotspot" style="top:60%; left:30%;" onclick="show(event,'ATC Tower','Air traffic control tower')"></div>

<div class="hotspot" style="top:65%; left:25%;" onclick="show(event,'Hangar','Aircraft maintenance hangar')"></div>

<div class="hotspot" style="top:60%; left:85%;" onclick="show(event,'Fuel Farm','Fuel storage area')"></div>

<div class="hotspot" style="top:65%; left:90%;" onclick="show(event,'Fire Station','Emergency response unit')"></div>

<div class="hotspot" style="top:70%; left:88%;" onclick="show(event,'Maintenance Area','Technical maintenance area')"></div>

<!-- NAVIGATION -->
<div class="hotspot" style="top:20%; left:10%;" onclick="show(event,'PAPI Lights','Visual glide slope system')"></div>

<div class="hotspot" style="top:22%; left:12%;" onclick="show(event,'Approach Lighting','Runway approach lighting system')"></div>

<div id="info" class="info"></div>

</div>

<br>

<button onclick="location.href='training.html'">⬅ Back</button>

<script>

function show(e,title,desc){
let box=document.getElementById("info");

box.style.display="block";
box.style.left=e.pageX+"px";
box.style.top=e.pageY+"px";

box.innerHTML="<b>"+title+"</b><br>"+desc;
}

document.addEventListener("click",function(e){
if(!e.target.classList.contains("hotspot")){
document.getElementById("info").style.display="none";
}
});

</script>

</body>
</html>
